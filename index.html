<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Safi 💙</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100% !important;
        height: 100% !important;
      }

      /* Nom Safi — parfaitement centré */
      .name-wrap {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      .name {
        font-family: "Great Vibes", cursive;
        font-size: clamp(4rem, 20vw, 10rem);
        background: linear-gradient(
          135deg,
          #fff 0%,
          #ffb3d1 35%,
          #fff 55%,
          #ff6eb4 80%,
          #fff 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: none;
        opacity: 0;
        transform: scale(0.5);
        animation:
          nameAppear 2s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards,
          shimmer 4s linear 3s infinite;
        filter: drop-shadow(0 0 20px rgba(255, 80, 150, 0.8))
          drop-shadow(0 0 50px rgba(255, 80, 150, 0.4));
      }

      @keyframes nameAppear {
        from {
          opacity: 0;
          transform: scale(0.5);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes shimmer {
        to {
          background-position: 200% center;
        }
      }

      /* Petits coeurs flottants */
      .floaties {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: none;
        overflow: hidden;
      }

      .floaty {
        position: absolute;
        bottom: -20px;
        opacity: 0;
        animation: floatUp linear infinite;
      }

      @keyframes floatUp {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.7;
        }
        90% {
          opacity: 0.2;
        }
        100% {
          transform: translateY(-110vh) rotate(360deg);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- SVG caché coeur -->
    <svg
      id="heartSVG"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 600 552"
      style="display: none"
    >
      <path
        id="heartPath"
        d="M300,488 C300,488 50,340 50,180
       C50,100 110,40 190,40
       C240,40 280,65 300,100
       C320,65 360,40 410,40
       C490,40 550,100 550,180
       C550,340 300,488 300,488 Z"
      />
    </svg>

    <!-- Coeurs flottants -->
    <div class="floaties" id="floaties"></div>

    <!-- Nom centré -->
    <div class="name-wrap">
      <div class="name">Safi</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
      // ── THREE.JS SETUP ─────────────────────────────────────────────
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        60,
        innerWidth / innerHeight,
        0.1,
        5000,
      );
      const isMobile = innerWidth < 768;

      // Zoom adapté à la taille d'écran
      camera.position.set(0, 0, isMobile ? 750 : 600);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setClearColor(0x000000, 1);
      document.body.appendChild(renderer.domElement);

      // ── POINTS DU COEUR ────────────────────────────────────────────
      const path = document.getElementById("heartPath");
      const length = path.getTotalLength();

      const positions = [];
      const colors = [];
      const vectors = [];

      const palette = [
        new THREE.Color(1.0, 0.0, 0.3),
        new THREE.Color(1.0, 0.15, 0.5),
        new THREE.Color(0.95, 0.0, 0.55),
        new THREE.Color(1.0, 0.35, 0.65),
        new THREE.Color(0.85, 0.0, 0.75),
        new THREE.Color(1.0, 0.5, 0.8),
      ];

      const STEP = isMobile ? 0.55 : 0.35;
      const SCALE = isMobile ? 0.65 : 1.0;

      for (let i = 0; i < length; i += STEP) {
        const point = path.getPointAtLength(i);
        const x = (point.x - 300) * SCALE;
        const y = -(point.y - 276) * SCALE;

        vectors.push({ x, y, z: 0 });
        positions.push(
          (Math.random() - 0.5) * (isMobile ? 500 : 1200),
          (Math.random() - 0.5) * (isMobile ? 500 : 1200),
          (Math.random() - 0.5) * (isMobile ? 300 : 800),
        );

        const c = palette[Math.floor(Math.random() * palette.length)];
        colors.push(c.r, c.g, c.b);
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute(
        "position",
        new THREE.BufferAttribute(new Float32Array(positions), 3),
      );
      geometry.setAttribute(
        "color",
        new THREE.BufferAttribute(new Float32Array(colors), 3),
      );

      const material = new THREE.PointsMaterial({
        size: isMobile ? 2.8 : 3.5,
        vertexColors: true,
        transparent: true,
        opacity: 0.95,
        sizeAttenuation: true,
      });

      const points = new THREE.Points(geometry, material);
      scene.add(points);

      // ── GSAP ANIMATIONS ────────────────────────────────────────────
      const posAttr = geometry.attributes.position;
      const tl = gsap.timeline({ repeat: -1, yoyo: true, repeatDelay: 0.8 });

      vectors.forEach((target, i) => {
        tl.to(
          posAttr.array,
          {
            [i * 3]: target.x,
            [i * 3 + 1]: target.y,
            [i * 3 + 2]: target.z + (Math.random() - 0.5) * 40,
            ease: "power2.inOut",
            duration: gsap.utils.random(1.5, 3.5),
            delay: i * 0.0005,
            onUpdate: () => {
              posAttr.needsUpdate = true;
            },
          },
          0,
        );
      });

      // Pulsation
      gsap.to(points.scale, {
        x: 1.08,
        y: 1.08,
        z: 1.08,
        repeat: -1,
        yoyo: true,
        duration: 0.7,
        ease: "power1.inOut",
      });

      // Rotation lente
      gsap.to(points.rotation, {
        y: Math.PI * 2,
        repeat: -1,
        duration: 14,
        ease: "none",
      });

      // ── RESIZE ─────────────────────────────────────────────────────
      window.addEventListener("resize", () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });

      // ── RENDER LOOP ────────────────────────────────────────────────
      (function animate() {
        requestAnimationFrame(animate);
        posAttr.needsUpdate = true;
        renderer.render(scene, camera);
      })();

      // ── COEURS FLOTTANTS ───────────────────────────────────────────
      const floaties = document.getElementById("floaties");
      const EMOJIS = ["♥", "❤", "💕", "✨", "💫", "♡", "🌸"];

      function createFloaty() {
        const el = document.createElement("span");
        el.classList.add("floaty");
        el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
        el.style.left = Math.random() * 100 + "vw";
        el.style.fontSize = Math.random() * 14 + 8 + "px";
        el.style.color = `hsl(${Math.random() * 40 + 320}, 100%, ${Math.random() * 20 + 65}%)`;
        const dur = Math.random() * 8 + 6;
        el.style.animationDuration = dur + "s";
        el.style.animationDelay = Math.random() * 3 + "s";
        floaties.appendChild(el);
        setTimeout(() => el.remove(), (dur + 4) * 1000);
      }

      setInterval(createFloaty, 700);
      for (let i = 0; i < 10; i++) createFloaty();
    </script>
  </body>
</html>

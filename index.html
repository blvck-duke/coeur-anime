<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pour Safi 💙</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw !important;
        height: 100vh !important;
      }

      /* ── OVERLAY TEXTE ── */
      .overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        gap: clamp(8px, 3vw, 20px);
      }

      /* ── NOM SAFI ── */
      .name {
        font-family: "Great Vibes", cursive;
        font-size: clamp(5rem, 22vw, 12rem);
        color: #fff;
        opacity: 0;
        transform: scale(0.5);
        animation: nameAppear 2s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
        text-shadow:
          0 0 20px rgba(255, 80, 150, 0.8),
          0 0 60px rgba(255, 80, 150, 0.4),
          0 0 100px rgba(200, 0, 100, 0.3);
        letter-spacing: 4px;
        line-height: 1;
      }

      /* Shimmer sur le nom */
      .name span {
        background: linear-gradient(
          135deg,
          #fff 0%,
          #ffb3d1 30%,
          #fff 50%,
          #ff6eb4 70%,
          #fff 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation:
          nameAppear 2s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards,
          shimmer 4s linear 3s infinite;
      }

      @keyframes shimmer {
        to {
          background-position: 200% center;
        }
      }

      /* ── LIGNE DÉCO ── */
      .deco-line {
        display: flex;
        align-items: center;
        gap: 12px;
        opacity: 0;
        animation: fadeUp 1.2s ease 2.2s forwards;
      }

      .deco-line::before,
      .deco-line::after {
        content: "";
        width: clamp(40px, 12vw, 100px);
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 150, 180, 0.6)
        );
      }
      .deco-line::after {
        background: linear-gradient(
          90deg,
          rgba(255, 150, 180, 0.6),
          transparent
        );
      }

      .deco-heart {
        font-size: clamp(0.8rem, 2vw, 1rem);
        color: rgba(255, 150, 180, 0.8);
        animation: heartBeat 1.2s ease-in-out 2.2s infinite;
      }

      @keyframes heartBeat {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.3);
        }
      }

      /* ── MESSAGE ── */
      .message {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-weight: 300;
        font-size: clamp(0.85rem, 3vw, 1.3rem);
        color: rgba(255, 200, 220, 0.85);
        letter-spacing: clamp(2px, 1vw, 5px);
        text-align: center;
        opacity: 0;
        padding: 0 20px;
        animation: fadeUp 1.2s ease 2.8s forwards;
        text-shadow: 0 0 20px rgba(255, 100, 150, 0.4);
        line-height: 1.6;
      }

      /* ── PETIT TEXTE BAS ── */
      .sub-message {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(0.65rem, 2vw, 0.9rem);
        color: rgba(255, 150, 180, 0.45);
        letter-spacing: clamp(3px, 1.5vw, 8px);
        text-align: center;
        opacity: 0;
        padding: 0 20px;
        text-transform: uppercase;
        animation: fadeUp 1.2s ease 3.4s forwards;
      }

      /* ── KEYFRAMES ── */
      @keyframes nameAppear {
        from {
          opacity: 0;
          transform: scale(0.5);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── PARTICULES FLOTTANTES CSS ── */
      .floaties {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: none;
        overflow: hidden;
      }

      .floaty {
        position: absolute;
        bottom: -20px;
        font-size: clamp(10px, 2vw, 18px);
        opacity: 0;
        animation: floatUp linear infinite;
      }

      @keyframes floatUp {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.6;
        }
        90% {
          opacity: 0.2;
        }
        100% {
          transform: translateY(-100vh) rotate(360deg);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- SVG caché pour le coeur -->
    <svg
      id="heartSVG"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 600 552"
      style="display: none"
    >
      <path
        id="heartPath"
        d="M300,488 C300,488 50,340 50,180
       C50,100 110,40 190,40
       C240,40 280,65 300,100
       C320,65 360,40 410,40
       C490,40 550,100 550,180
       C550,340 300,488 300,488 Z"
      />
    </svg>

    <!-- Petits coeurs flottants -->
    <div class="floaties" id="floaties"></div>

    <!-- Texte overlay -->
    <div class="overlay">
      <div class="name"><span>Safi</span></div>
      <div class="deco-line"><span class="deco-heart">♥</span></div>
      <div class="message"></div>
      <div class="sub-message"></div>
    </div>

    <!-- Three.js + GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
      // ── SETUP THREE.JS ─────────────────────────────────────────────
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        60,
        innerWidth / innerHeight,
        0.1,
        5000,
      );

      // Zoom adapté au mobile
      const isMobile = innerWidth < 600;
      camera.position.set(0, 0, isMobile ? 800 : 600);

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
      });
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setClearColor(0x000000, 1);
      document.body.appendChild(renderer.domElement);

      // ── EXTRAIRE POINTS DU COEUR ───────────────────────────────────
      const path = document.getElementById("heartPath");
      const length = path.getTotalLength();

      const positions = [];
      const colors = [];
      const vectors = [];

      const palette = [
        new THREE.Color(1.0, 0.0, 0.3),
        new THREE.Color(1.0, 0.15, 0.5),
        new THREE.Color(0.95, 0.0, 0.55),
        new THREE.Color(1.0, 0.35, 0.65),
        new THREE.Color(0.85, 0.0, 0.75),
        new THREE.Color(1.0, 0.5, 0.8),
      ];

      // Densité réduite sur mobile pour les perfs
      const STEP = isMobile ? 0.6 : 0.35;

      // Échelle réduite sur mobile
      const SCALE = isMobile ? 0.7 : 1;

      for (let i = 0; i < length; i += STEP) {
        const point = path.getPointAtLength(i);
        const x = (point.x - 300) * SCALE;
        const y = -(point.y - 276) * SCALE;
        const z = 0;

        vectors.push({ x, y, z });

        positions.push(
          (Math.random() - 0.5) * (isMobile ? 600 : 1200),
          (Math.random() - 0.5) * (isMobile ? 600 : 1200),
          (Math.random() - 0.5) * (isMobile ? 400 : 800),
        );

        const c = palette[Math.floor(Math.random() * palette.length)];
        colors.push(c.r, c.g, c.b);
      }

      // ── PARTICULES ─────────────────────────────────────────────────
      const geometry = new THREE.BufferGeometry();
      const posArray = new Float32Array(positions);
      const colArray = new Float32Array(colors);

      geometry.setAttribute("position", new THREE.BufferAttribute(posArray, 3));
      geometry.setAttribute("color", new THREE.BufferAttribute(colArray, 3));

      const material = new THREE.PointsMaterial({
        size: isMobile ? 2.5 : 3.5,
        vertexColors: true,
        transparent: true,
        opacity: 0.95,
        sizeAttenuation: true,
      });

      const points = new THREE.Points(geometry, material);
      scene.add(points);

      // ── LUMIÈRE ────────────────────────────────────────────────────
      const light = new THREE.PointLight(0xff0055, 2, 800);
      light.position.set(0, 0, 200);
      scene.add(light);

      // ── ANIMATION GSAP ─────────────────────────────────────────────
      const posAttr = geometry.attributes.position;
      const tl = gsap.timeline({ repeat: -1, yoyo: true, repeatDelay: 0.8 });

      vectors.forEach((target, i) => {
        tl.to(
          posAttr.array,
          {
            [i * 3]: target.x,
            [i * 3 + 1]: target.y,
            [i * 3 + 2]: target.z + (Math.random() - 0.5) * 40,
            ease: "power2.inOut",
            duration: gsap.utils.random(1.5, 3.5),
            delay: i * 0.0005,
            onUpdate: () => {
              posAttr.needsUpdate = true;
            },
          },
          0,
        );
      });

      // ── PULSATION ──────────────────────────────────────────────────
      gsap.to(points.scale, {
        x: 1.08,
        y: 1.08,
        z: 1.08,
        repeat: -1,
        yoyo: true,
        duration: 0.7,
        ease: "power1.inOut",
      });

      // ── ROTATION ───────────────────────────────────────────────────
      gsap.to(points.rotation, {
        y: Math.PI * 2,
        repeat: -1,
        duration: 14,
        ease: "none",
      });

      // ── RESIZE ─────────────────────────────────────────────────────
      window.addEventListener("resize", () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });

      // ── RENDER LOOP ────────────────────────────────────────────────
      (function animate() {
        requestAnimationFrame(animate);
        posAttr.needsUpdate = true;
        renderer.render(scene, camera);
      })();

      // ── PETITS COEURS FLOTTANTS CSS ────────────────────────────────
      const floaties = document.getElementById("floaties");
      const EMOJIS = ["♥", "❤", "💕", "✨", "💫", "♡"];

      function createFloaty() {
        const el = document.createElement("span");
        el.classList.add("floaty");
        el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
        el.style.left = Math.random() * 100 + "vw";
        el.style.fontSize = Math.random() * 16 + 8 + "px";
        el.style.color = `hsl(${Math.random() * 40 + 320}, 100%, ${Math.random() * 20 + 70}%)`;
        const dur = Math.random() * 8 + 6;
        el.style.animationDuration = dur + "s";
        el.style.animationDelay = Math.random() * 5 + "s";
        el.style.opacity = 0;
        floaties.appendChild(el);
        setTimeout(() => el.remove(), (dur + 5) * 1000);
      }

      // Créer des coeurs en continu
      setInterval(createFloaty, 600);
      for (let i = 0; i < 8; i++) createFloaty();
    </script>
  </body>
</html>
